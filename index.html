<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RuralCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-10">
    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">RuralCare</h1>
            <div class="flex items-center space-x-2 bg-amber-50 px-3 py-1 rounded-full border border-amber-200">
                <span class="offline-pulse h-2 w-2 rounded-full bg-amber-500"></span>
                <span class="text-xs font-semibold text-amber-700">Offline Mode</span>
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto mt-8 px-4">
        <div class="flex justify-between items-end mb-6">
            <div>
                <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Dashboard</h2>
                <p class="text-sm text-slate-500">Manage offline records</p>
            </div>
            <a href="intake.html" class="bg-indigo-600 hover:bg-indigo-700 text-white p-3 rounded-xl shadow-sm transition-all flex items-center justify-center">
                <i data-lucide="plus" class="w-5 h-5"></i>
            </a>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-medium text-slate-500">Queued</h3>
                    <i data-lucide="clock" class="w-4 h-4 text-amber-500"></i>
                </div>
                <p class="text-3xl font-bold text-slate-800" id="queued-count">0</p>
            </div>
            <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-2">
                    <h3 class="text-sm font-medium text-slate-500">Synced</h3>
                    <i data-lucide="check-circle-2" class="w-4 h-4 text-emerald-500"></i>
                </div>
                <p class="text-3xl font-bold text-slate-800">0</p>
            </div>
        </div>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-lg font-semibold text-slate-800">Pending Sync</h3>
                <button id="sync-btn" class="text-sm font-medium text-indigo-600 hover:text-indigo-700 flex items-center transition-colors">
                    <i data-lucide="refresh-cw" class="w-4 h-4 mr-1"></i> Sync All
                </button>
            </div>
            
            <div id="patient-list" class="space-y-3">
            </div>
        </section>
    </main>

    <script src="js/index.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
