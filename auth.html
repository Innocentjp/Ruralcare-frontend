<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | RuralCare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1f2937; }
        .mobile-container { max-width: 400px; margin: 0 auto; background: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="antialiased text-slate-800">
    <div class="mobile-container flex flex-col py-10 px-6">
        <div class="text-center mb-8 pt-4">
            <h1 id="form-title" class="text-2xl font-bold text-slate-900 tracking-tight">Create Account</h1>
            <p id="form-subtitle" class="text-[13px] text-slate-500 mt-2 font-medium leading-relaxed px-4">Join RuralCare Pro to manage clinical records securely.</p>
        </div>

        <form id="auth-form" class="space-y-5 flex-grow">
            <div id="signup-fields" class="space-y-5">
                <div>
                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Full Name</label>
                    <div class="relative flex items-center">
                        <i data-lucide="user" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="full-name" placeholder="Dr. Jane Doe" class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all placeholder:text-slate-300">
                    </div>
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Clinic / Organization</label>
                    <div class="relative flex items-center">
                        <i data-lucide="plus-square" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                        <input type="text" id="clinic" placeholder="Rural Health Unit A" class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all placeholder:text-slate-300">
                    </div>
                </div>
                <div>
                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Role</label>
                    <div class="relative flex items-center">
                        <i data-lucide="clipboard" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                        <select class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-10 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all appearance-none font-medium">
                            <option value="">Select your role</option>
                            <option value="doctor">Doctor</option>
                            <option value="nurse">Nurse</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 w-4 h-4 text-slate-400 pointer-events-none"></i>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-[13px] font-bold text-slate-800 mb-2">Email Address</label>
                <div class="relative flex items-center">
                    <i data-lucide="mail" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                    <input type="email" required placeholder="jane.doe@example.com" class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all placeholder:text-slate-300">
                </div>
            </div>
            
            <div>
                <label class="block text-[13px] font-bold text-slate-800 mb-2">Password</label>
                <div class="relative flex items-center">
                    <i data-lucide="lock" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                    <input type="password" required placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-11 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all placeholder:text-slate-300 tracking-widest">
                    <i data-lucide="eye-off" class="absolute right-4 w-4 h-4 text-slate-400 cursor-pointer"></i>
                </div>
            </div>

            <div id="signup-extra-fields" class="space-y-5">
                <div class="space-y-2">
                    <div class="flex gap-1">
                        <div class="h-1 w-full bg-slate-200 rounded-full"></div>
                        <div class="h-1 w-full bg-slate-200 rounded-full"></div>
                        <div class="h-1 w-full bg-slate-200 rounded-full"></div>
                        <div class="h-1 w-full bg-slate-200 rounded-full"></div>
                    </div>
                    <p class="text-[11px] text-slate-500 font-medium">Password must be at least 8 characters</p>
                </div>

                <div>
                    <label class="block text-[13px] font-bold text-slate-800 mb-2">Confirm Password</label>
                    <div class="relative flex items-center">
                        <i data-lucide="rotate-ccw" class="absolute left-4 w-4 h-4 text-slate-400"></i>
                        <input type="password" placeholder="••••••••" class="w-full bg-white border border-slate-200 rounded-xl py-3.5 pl-11 pr-4 text-[14px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none transition-all placeholder:text-slate-300 tracking-widest">
                    </div>
                </div>

                <div class="flex items-start gap-3 pt-2">
                    <input type="checkbox" class="mt-0.5 w-4 h-4 border-slate-300 rounded text-[#3454D1] focus:ring-[#3454D1]">
                    <label class="text-[12px] text-slate-600 font-medium leading-relaxed">
                        I agree to the <a href="#" class="text-[#3454D1] hover:underline">Terms of Service</a> and <a href="#" class="text-[#3454D1] hover:underline">Privacy Policy</a>.
                    </label>
                </div>
            </div>

            <div id="signin-extra-fields" class="hidden flex items-center justify-between pt-1">
                <div class="flex items-center gap-2">
                    <input type="checkbox" id="remember" class="w-4 h-4 border-slate-300 rounded text-[#3454D1] focus:ring-[#3454D1]">
                    <label for="remember" class="text-[13px] font-medium text-slate-600">Remember me</label>
                </div>
                <a href="#" class="text-[13px] font-bold text-[#3454D1] hover:underline">Forgot password?</a>
            </div>
            
            <div class="pt-6">
                <div class="p-[2px] border border-dashed border-[#3454D1]/40 rounded-xl">
                    <button type="submit" id="submit-btn" class="w-full bg-[#3454D1] text-white font-semibold text-[14px] py-4 rounded-[10px] shadow-sm transition-all flex justify-center items-center">
                        Create Account
                    </button>
                </div>
            </div>

            <div id="secure-badge" class="hidden mt-4 bg-slate-50 border border-slate-100 rounded-xl p-4 flex items-start gap-3">
                <i data-lucide="refresh-cw" class="w-4 h-4 text-[#3454D1] mt-0.5"></i>
                <p class="text-[12px] text-slate-600 font-medium leading-relaxed">Your data stays secure and syncs automatically once you're back online.</p>
            </div>
        </form>
        
        <div class="mt-8 text-center pb-4">
            <span id="toggle-text" class="text-[13px] font-medium text-slate-600">Already have an account?</span> 
            <button id="toggle-auth" class="text-[13px] font-bold text-[#3454D1] hover:underline ml-1 px-[2px] py-[2px] border border-dashed border-[#3454D1]/40 rounded">Sign In</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const toggleAuth = document.getElementById('toggle-auth');
        
        const signupFields = document.getElementById('signup-fields');
        const signupExtraFields = document.getElementById('signup-extra-fields');
        const signinExtraFields = document.getElementById('signin-extra-fields');
        const secureBadge = document.getElementById('secure-badge');
        
        let isSignUp = true;

        toggleAuth.addEventListener('click', () => {
            isSignUp = !isSignUp;
            if (isSignUp) {
                formTitle.textContent = "Create Account";
                formSubtitle.textContent = "Join RuralCare Pro to manage clinical records securely.";
                submitBtn.innerHTML = "Create Account";
                toggleText.textContent = "Already have an account?";
                toggleAuth.textContent = "Sign In";
                
                signupFields.classList.remove('hidden');
                signupExtraFields.classList.remove('hidden');
                signinExtraFields.classList.add('hidden');
                secureBadge.classList.add('hidden');
            } else {
                formTitle.textContent = "RuralCare Pro";
                formSubtitle.textContent = "Sign in to access clinical records";
                submitBtn.innerHTML = 'Sign In <i data-lucide="arrow-right" class="w-4 h-4 ml-2"></i>';
                toggleText.textContent = "Don't have an account?";
                toggleAuth.textContent = "Create one";
                
                signupFields.classList.add('hidden');
                signupExtraFields.classList.add('hidden');
                signinExtraFields.classList.remove('hidden');
                secureBadge.classList.remove('hidden');
            }
            lucide.createIcons();
        });

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
