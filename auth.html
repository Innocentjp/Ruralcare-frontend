<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication | RuralCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white p-8 rounded-2xl border border-slate-200 shadow-sm">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-100 rounded-2xl mb-4">
                <i data-lucide="heart-pulse" class="w-7 h-7 text-indigo-600"></i>
            </div>
            <h1 id="form-title" class="text-2xl font-bold text-slate-800 tracking-tight">Welcome Back</h1>
            <p id="form-subtitle" class="text-sm text-slate-500 mt-1">Sign in to continue to RuralCare</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <div id="name-field" class="hidden">
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name</label>
                <input type="text" id="user-name" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Email Address</label>
                <input type="email" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input type="password" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
            </div>
            
            <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-sm transition-all flex justify-center items-center mt-2">
                Sign In
            </button>
        </form>
        
        <p class="text-center text-sm text-slate-500 mt-6">
            <span id="toggle-text">Don't have an account?</span> 
            <button id="toggle-auth" class="text-indigo-600 font-medium hover:text-indigo-700 ml-1">Sign Up</button>
        </p>
    </div>

    <script>
        lucide.createIcons();
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const submitBtn = document.getElementById('submit-btn');
        const toggleText = document.getElementById('toggle-text');
        const toggleAuth = document.getElementById('toggle-auth');
        const nameField = document.getElementById('name-field');
        let isSignUp = false;

        toggleAuth.addEventListener('click', () => {
            isSignUp = !isSignUp;
            if (isSignUp) {
                formTitle.textContent = "Create Account";
                formSubtitle.textContent = "Join the RuralCare network";
                submitBtn.textContent = "Create Account";
                toggleText.textContent = "Already have an account?";
                toggleAuth.textContent = "Sign In";
                nameField.classList.remove('hidden');
            } else {
                formTitle.textContent = "Welcome Back";
                formSubtitle.textContent = "Sign in to continue to RuralCare";
                submitBtn.textContent = "Sign In";
                toggleText.textContent = "Don't have an account?";
                toggleAuth.textContent = "Sign Up";
                nameField.classList.add('hidden');
            }
        });

        document.getElementById('auth-form').addEventListener('submit', (e) => {
            e.preventDefault();
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
