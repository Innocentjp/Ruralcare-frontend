<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In | RuralCare</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config = { darkMode: 'class' };</script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/index.css">
</head>
<body class="antialiased text-[#141A29] bg-[#F7F9FC] min-h-screen">

  <div class="min-h-screen flex flex-col items-center justify-center px-5 py-10">

    <div class="flex items-center mb-8">
      <img src="./img/logo-full-color.png" alt="RuralCare" class="h-10 object-contain">
    </div>

    <div class="w-full sm:max-w-[420px] card p-7 sm:p-8">

      <div class="text-center mb-7">
        <h1 id="form-title" class="text-[22px] font-semibold tracking-tight text-[#141A29]">Sign in to your workspace</h1>
        <p id="form-subtitle" class="text-[13px] text-[#5B6472] mt-2 leading-relaxed">Access clinical records for your clinic or care team.</p>
      </div>

      <form id="auth-form" class="space-y-4" novalidate>

        <div id="signup-fields" class="space-y-4 hidden">
          <div>
            <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Full name</label>
            <div class="relative flex items-center">
              <i data-lucide="user" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
              <input type="text" id="full-name" placeholder="Dr. Jane Doe" class="input-field pl-10 text-left">
            </div>
            <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
          </div>
          
          <div>
            <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Role</label>
            <div class="relative flex items-center w-full">
              <select id="role" class="w-full h-[46px] bg-white dark:bg-[#0F1524] border border-[#E2E8F0] dark:border-white/10 rounded-xl px-4 pr-9 appearance-none font-medium text-[#141A29] text-left focus:outline-none focus:ring-2 focus:ring-[#2F80ED]/20">
                <option value="" disabled selected>Select your role</option>
                <option value="Community Health Worker (CHEW)">Community Health Worker (CHEW)</option>
                <option value="Medical Officer">Medical Officer</option>
                <option value="Physiotherapist">Physiotherapist</option>
                <option value="Nurse / Midwife">Nurse / Midwife</option>
                <option value="NGO / Program Supervisor">NGO / Program Supervisor</option>
                <option value="Clinic Administrator">Clinic Administrator</option>
              </select>
              <i data-lucide="chevron-down" class="absolute right-3.5 w-4 h-4 text-[#94A3B8] pointer-events-none"></i>
            </div>
            <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
          </div>

          <div>
            <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Practicing License No. / Facility ID</label>
            <div class="relative flex items-center">
              <i data-lucide="shield-check" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
              <input type="text" id="license-no" placeholder="e.g. MDCN, NMCN, MRTBN or PHC-042" class="input-field pl-10 text-left">
            </div>
            <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
          </div>

          <div>
            <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Clinic / organization</label>
            <div class="relative flex items-center">
              <i data-lucide="building-2" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
              <input type="text" id="clinic" placeholder="Rural Health Unit" class="input-field pl-10 text-left">
            </div>
            <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">State</label>
              <div class="relative flex items-center w-full">
                <select id="state" class="w-full h-[46px] bg-white dark:bg-[#0F1524] border border-[#E2E8F0] dark:border-white/10 rounded-xl px-4 pr-9 appearance-none font-medium text-[#141A29] text-left focus:outline-none focus:ring-2 focus:ring-[#2F80ED]/20">
                  <option value="Enugu" selected>Enugu</option>
                  <option value="Lagos">Lagos</option>
                  <option value="Anambra">Anambra</option>
                  <option value="Oyo">Oyo</option>
                  <option value="Rivers">Rivers</option>
                </select>
                <i data-lucide="chevron-down" class="absolute right-3.5 w-4 h-4 text-[#94A3B8] pointer-events-none"></i>
              </div>
            </div>
            <div>
              <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">LGA / District</label>
              <div class="relative flex items-center w-full">
                <select id="lga" class="w-full h-[46px] bg-white dark:bg-[#0F1524] border border-[#E2E8F0] dark:border-white/10 rounded-xl px-4 pr-9 appearance-none font-medium text-[#141A29] text-left focus:outline-none focus:ring-2 focus:ring-[#2F80ED]/20"></select>
                <i data-lucide="chevron-down" class="absolute right-3.5 w-4 h-4 text-[#94A3B8] pointer-events-none"></i>
              </div>
            </div>
          </div>
        </div>

        <div>
          <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Email address</label>
          <div class="relative flex items-center">
            <i data-lucide="mail" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
            <input type="email" id="email" placeholder="jane.doe@example.org" class="input-field pl-10 text-left">
          </div>
          <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
        </div>

        <div>
          <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Password</label>
          <div class="relative flex items-center">
            <i data-lucide="lock" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
            <input type="password" id="password" placeholder="••••••••" class="input-field pl-10 pr-10 tracking-widest text-left">
            <button type="button" id="toggle-pw" class="absolute right-3.5 text-[#94A3B8]"><i data-lucide="eye-off" class="w-4 h-4"></i></button>
          </div>
          <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
        </div>

        <div id="signup-extra-fields" class="space-y-4 hidden">
          <div class="space-y-1.5">
            <div class="flex gap-1" id="strength-bars">
              <div class="h-1 w-full bg-[#E2E8F0] rounded-full"></div>
              <div class="h-1 w-full bg-[#E2E8F0] rounded-full"></div>
              <div class="h-1 w-full bg-[#E2E8F0] rounded-full"></div>
              <div class="h-1 w-full bg-[#E2E8F0] rounded-full"></div>
            </div>
            <p id="strength-label" class="text-[11px] text-[#5B6472] font-medium">Password must be at least 8 characters</p>
          </div>

          <div>
            <label class="block text-[12.5px] font-semibold text-[#141A29] mb-1.5">Confirm password</label>
            <div class="relative flex items-center">
              <i data-lucide="rotate-ccw" class="absolute left-3.5 w-4 h-4 text-[#94A3B8]"></i>
              <input type="password" id="confirm-password" placeholder="••••••••" class="input-field pl-10 tracking-widest text-left">
            </div>
            <p class="field-error-text hidden text-[11px] font-semibold text-[#E11D48] mt-1"></p>
          </div>

          <label class="flex items-start gap-2.5 pt-1 cursor-pointer">
            <input type="checkbox" id="terms" class="mt-0.5 w-4 h-4 rounded border-[#CBD5E1] text-[#2F80ED] focus:ring-[#2F80ED]">
            <span class="text-[12px] text-[#5B6472] font-medium leading-relaxed">
              I agree to the <a href="#" class="text-[#2F80ED] font-semibold hover:underline">Terms of Service</a> and <a href="#" class="text-[#2F80ED] font-semibold hover:underline">Privacy Policy</a>.
            </span>
          </label>
        </div>

        <div id="signin-extra-fields" class="flex items-center justify-between pt-1">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="remember" class="w-4 h-4 rounded border-[#CBD5E1] text-[#2F80ED] focus:ring-[#2F80ED]">
            <span class="text-[13px] font-medium text-[#5B6472]">Remember me</span>
          </label>
          <a href="#" class="text-[13px] font-semibold text-[#2F80ED] hover:underline">Forgot password?</a>
        </div>

        <button type="submit" id="submit-btn" class="btn-primary w-full py-3.5 text-[14px] flex justify-center items-center gap-2 mt-2">
          Sign In
        </button>

        <p id="form-error" class="hidden text-[12px] font-semibold text-[#E11D48] text-center"></p>

        <div id="secure-badge" class="mt-2 bg-[#F4F6F9] border border-[#EDF1F7] rounded-xl p-3.5 flex items-start gap-2.5">
          <i data-lucide="shield-check" class="w-4 h-4 text-[#2F80ED] mt-0.5 shrink-0"></i>
          <p class="text-[11.5px] text-[#5B6472] font-medium leading-relaxed">Your data stays secure and syncs automatically once you're back online.</p>
        </div>
      </form>
    </div>

    <div class="mt-6 text-center">
      <span id="toggle-text" class="text-[13px] font-medium text-[#5B6472]">Don't have an account?</span>
      <button id="toggle-auth" class="text-[13px] font-semibold text-[#2F80ED] hover:underline ml-1">Create one</button>
    </div>
  </div>

  <script>
    lucide.createIcons();

    const formTitle = document.getElementById('form-title');
    const formSubtitle = document.getElementById('form-subtitle');
    const submitBtn = document.getElementById('submit-btn');
    const toggleText = document.getElementById('toggle-text');
    const toggleAuth = document.getElementById('toggle-auth');
    const signupFields = document.getElementById('signup-fields');
    const signupExtraFields = document.getElementById('signup-extra-fields');
    const signinExtraFields = document.getElementById('signin-extra-fields');
    const secureBadge = document.getElementById('secure-badge');
    const formError = document.getElementById('form-error');
    const stateSelect = document.getElementById('state');
    const lgaSelect = document.getElementById('lga');

    const geoData = {
      Enugu: ["Enugu North", "Nsukka", "Enugu South", "Awgu", "Udi"],
      Lagos: ["Ikeja", "Lagos Island", "Alimosho", "Eti-Osa", "Surulere"],
      Anambra: ["Awka South", "Onitsha North", "Nnewi North", "Ihiala", "Aguata"],
      Oyo: ["Ibadan North", "Ogbomosho North", "Oyo East", "Akinyele", "Iseyin"],
      Rivers: ["Port Harcourt", "Obio-Akpor", "Bonny", "Eleme", "Ikwerre"]
    };

    function updateLGAs() {
      const selectedState = stateSelect.value;
      const lgas = geoData[selectedState] || [];
      lgaSelect.innerHTML = lgas.map(lga => `<option value="${lga}">${lga}</option>`).join('');
    }

    stateSelect.addEventListener('change', updateLGAs);
    updateLGAs();

    let isSignUp = false;

    function clearErrors() {
      document.querySelectorAll('.field-error-text').forEach(e => { e.classList.add('hidden'); e.textContent = ''; });
      document.querySelectorAll('.input-field').forEach(e => e.classList.remove('field-error'));
      formError.classList.add('hidden');
    }

    function showFieldError(id, message) {
      const field = document.getElementById(id);
      field.classList.add('field-error');
      const p = field.closest('div').parentElement.querySelector('.field-error-text') || field.parentElement.parentElement.querySelector('.field-error-text');
      if (p) { p.textContent = message; p.classList.remove('hidden'); }
    }

    function renderMode() {
      if (isSignUp) {
        formTitle.textContent = 'Create your account';
        formSubtitle.textContent = 'Join RuralCare to manage clinical records securely.';
        submitBtn.innerHTML = 'Create Account';
        toggleText.textContent = 'Already have an account?';
        toggleAuth.textContent = 'Sign in';
        signupFields.classList.remove('hidden');
        signupExtraFields.classList.remove('hidden');
        signinExtraFields.classList.add('hidden');
        secureBadge.classList.remove('hidden');
      } else {
        formTitle.textContent = 'Sign in to your workspace';
        formSubtitle.textContent = 'Access clinical records for your clinic or care team.';
        submitBtn.innerHTML = 'Sign In';
        toggleText.textContent = "Don't have an account?";
        toggleAuth.textContent = 'Create one';
        signupFields.classList.add('hidden');
        signupExtraFields.classList.add('hidden');
        signinExtraFields.classList.remove('hidden');
        secureBadge.classList.add('hidden');
      }
      clearErrors();
      lucide.createIcons();
    }

    toggleAuth.addEventListener('click', () => { isSignUp = !isSignUp; renderMode(); });

    document.getElementById('toggle-pw').addEventListener('click', (e) => {
      const pw = document.getElementById('password');
      const icon = e.currentTarget.querySelector('i');
      const show = pw.type === 'password';
      pw.type = show ? 'text' : 'password';
      icon.setAttribute('data-lucide', show ? 'eye' : 'eye-off');
      lucide.createIcons();
    });

    const strengthBars = () => document.querySelectorAll('#strength-bars > div');
    const strengthLabel = document.getElementById('strength-label');
    document.getElementById('password').addEventListener('input', (e) => {
      const val = e.target.value;
      let score = 0;
      if (val.length >= 8) score++;
      if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
      if (/\d/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;
      const colors = ['#E2E8F0', '#E11D48', '#F59E0B', '#2F80ED', '#0E9F6E'];
      const labels = ['Password must be at least 8 characters', 'Weak password', 'Fair password', 'Good password', 'Strong password'];
      strengthBars().forEach((bar, i) => { bar.style.background = i < score ? colors[score] : '#E2E8F0'; });
      strengthLabel.textContent = val.length === 0 ? labels[0] : labels[score];
    });

    document.getElementById('auth-form').addEventListener('submit', (e) => {
      e.preventDefault();
      clearErrors();
      let valid = true;

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !/^\S+@\S+\.\S+$/.test(email)) { showFieldError('email', 'Enter a valid email address.'); valid = false; }
      if (!password || password.length < (isSignUp ? 8 : 1)) { showFieldError('password', isSignUp ? 'Password must be at least 8 characters.' : 'Enter your password.'); valid = false; }

      let name = '', clinic = '', role = '', state = '', lga = '', licenseNo = '';
      if (isSignUp) {
        name = document.getElementById('full-name').value.trim();
        clinic = document.getElementById('clinic').value.trim();
        role = document.getElementById('role').value;
        licenseNo = document.getElementById('license-no').value.trim();
        state = stateSelect.value;
        lga = lgaSelect.value;
        
        const confirm = document.getElementById('confirm-password').value;
        const terms = document.getElementById('terms').checked;
        
        if (!name) { showFieldError('full-name', 'Full name is required.'); valid = false; }
        if (!role) { showFieldError('role', 'Select your role.'); valid = false; }
        if (!clinic) { showFieldError('clinic', 'Clinic is required.'); valid = false; }
        if (confirm !== password || !confirm) { showFieldError('confirm-password', 'Passwords do not match.'); valid = false; }
        if (!terms) { formError.textContent = 'Please accept the Terms of Service to continue.'; formError.classList.remove('hidden'); valid = false; }
      }

      if (!valid) return;

      const session = isSignUp
        ? { name, clinic, role, licenseNo, email, state, lga }
        : { ...(JSON.parse(localStorage.getItem('ruralcare_session') || 'null') || {}), email, name: (JSON.parse(localStorage.getItem('ruralcare_session') || 'null') || {}).name || email.split('@')[0] };

      localStorage.setItem('ruralcare_session', JSON.stringify(session));
      submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>';
      lucide.createIcons();
      setTimeout(() => { window.location.href = 'dashboard.html'; }, 500);
    });

    renderMode();
  </script>
</body>
</html>
