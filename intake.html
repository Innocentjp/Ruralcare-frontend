<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Intake | RuralCare</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-slate-50 font-sans min-h-screen pb-10">
    <header class="bg-white border-b border-slate-200 p-4 sticky top-0 z-10 shadow-sm">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 tracking-tight">RuralCare</h1>
            <div class="flex items-center space-x-2 bg-amber-50 px-3 py-1 rounded-full border border-amber-200">
                <span class="offline-pulse h-2 w-2 rounded-full bg-amber-500"></span>
                <span class="text-xs font-semibold text-amber-700">Offline Mode</span>
            </div>
        </div>
    </header>
    
    <main class="max-w-md mx-auto mt-8 px-4">
        <div class="flex items-center mb-6">
            <a href="dashboard.html" class="mr-4 text-slate-500 hover:text-indigo-600 transition-colors">
                <i data-lucide="arrow-left" class="w-6 h-6"></i>
            </a>
            <div>
                <h2 class="text-2xl font-bold text-slate-800 mb-1 tracking-tight">New Patient</h2>
                <p class="text-sm text-slate-500">Data will queue locally</p>
            </div>
        </div>
        
        <form id="intake-form" class="space-y-6">
            <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-lg font-semibold text-slate-800 mb-5 flex items-center">
                    <i data-lucide="user" class="w-5 h-5 mr-2 text-indigo-600"></i>
                    Demographics
                </h3>
                <div class="space-y-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Full Name *</label>
                        <input type="text" id="patient-name" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="grid grid-cols-2 gap-5">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Age *</label>
                            <input type="number" id="patient-age" required class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1.5">Sex</label>
                            <select id="patient-sex" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all appearance-none">
                                <option value="Female">Female</option>
                                <option value="Male">Male</option>
                            </select>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-2xl border border-slate-200 shadow-sm">
                <h3 class="text-lg font-semibold text-slate-800 mb-5 flex items-center">
                    <i data-lucide="activity" class="w-5 h-5 mr-2 text-indigo-600"></i>
                    Vitals Logging
                </h3>
                <div class="grid grid-cols-2 gap-5">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Blood Pressure</label>
                        <input type="text" id="vital-bp" placeholder="120/80" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Temp (°C)</label>
                        <input type="number" step="0.1" id="vital-temp" placeholder="36.5" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Heart Rate</label>
                        <input type="number" id="vital-hr" placeholder="72" class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1.5">Symptoms</label>
                        <input type="text" id="symptoms" placeholder="Fever..." class="w-full bg-slate-50 border border-slate-200 rounded-xl p-3 text-slate-800 focus:bg-white focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder-slate-400">
                    </div>
                </div>
            </section>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-4 rounded-xl shadow-sm transition-all flex justify-center items-center gap-2">
                <i data-lucide="save" class="w-5 h-5"></i>
                Save & Queue for Sync
            </button>
        </form>
    </main>

    <script src="js/index.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
