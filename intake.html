<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Patient Intake | RuralCare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1f2937; }
        .mobile-container { max-width: 400px; margin: 0 auto; background: #f8fafc; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); padding-bottom: 90px; }
    </style>
</head>
<body class="antialiased">
    <div class="mobile-container">
        <header class="bg-white px-4 py-4 flex justify-between items-center sticky top-0 z-20 shadow-sm">
            <div class="flex items-center gap-3">
                <a href="dashboard.html" class="w-8 h-8 flex items-center justify-center rounded-full border border-slate-200 text-slate-600">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                </a>
                <div>
                    <h1 class="text-[17px] font-bold text-[#3454D1] tracking-tight leading-tight">New Patient Intake</h1>
                    <div class="flex items-center text-[10px] text-slate-500 font-medium">
                        <i data-lucide="wifi-off" class="w-3 h-3 mr-1"></i>
                        Offline Mode - Data will queue for sync
                    </div>
                </div>
            </div>
            <button class="text-slate-600"><i data-lucide="moon" class="w-5 h-5"></i></button>
        </header>
        
        <main class="px-4 pt-6 space-y-6">
            <form id="intake-form">
                <section class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm mb-6">
                    <h3 class="text-[15px] font-bold text-slate-900 mb-5 flex items-center">
                        <i data-lucide="clipboard-list" class="w-5 h-5 mr-2 text-[#3454D1]"></i>
                        Demographics
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Patient ID</label>
                            <div class="relative flex items-center">
                                <i data-lucide="fingerprint" class="absolute left-3.5 w-4 h-4 text-slate-400"></i>
                                <input type="text" value="RCP-2489-A7" readonly class="w-full bg-slate-50 border border-slate-200 rounded-lg py-3 pl-10 pr-4 text-[13px] text-slate-500 font-medium outline-none">
                            </div>
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Full Name <span class="text-red-500">*</span></label>
                            <input type="text" id="patient-name" required placeholder="e.g. Jane Doe" class="w-full bg-white border border-slate-200 rounded-lg py-3 px-4 text-[13px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none placeholder:text-slate-300">
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Date of Birth <span class="text-red-500">*</span></label>
                            <div class="relative flex items-center">
                                <input type="text" id="patient-age" required placeholder="dd/mm/yyyy" class="w-full bg-white border border-slate-200 rounded-lg py-3 pl-4 pr-10 text-[13px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none placeholder:text-slate-300">
                                <i data-lucide="calendar" class="absolute right-3.5 w-4 h-4 text-slate-400 pointer-events-none"></i>
                            </div>
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Contact Number</label>
                            <input type="tel" placeholder="+1 (555) 000-0000" class="w-full bg-white border border-slate-200 rounded-lg py-3 px-4 text-[13px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none placeholder:text-slate-300">
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-2">Assigned Sex at Birth</label>
                            <div class="flex bg-slate-50 rounded-lg p-1 border border-slate-200">
                                <button type="button" class="flex-1 py-2 text-[13px] font-bold text-slate-500 rounded-md">Female</button>
                                <button type="button" class="flex-1 py-2 text-[13px] font-bold text-slate-500 rounded-md">Male</button>
                                <button type="button" class="flex-1 py-2 text-[13px] font-bold text-white bg-[#3454D1] rounded-md shadow-sm">Other</button>
                            </div>
                            <input type="hidden" id="patient-sex" value="Other">
                        </div>
                        <div>
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Community / Village</label>
                            <div class="relative flex items-center">
                                <i data-lucide="map-pin" class="absolute left-3.5 w-4 h-4 text-slate-400"></i>
                                <input type="text" placeholder="Select location" class="w-full bg-white border border-slate-200 rounded-lg py-3 pl-10 pr-4 text-[13px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none placeholder:text-slate-300">
                            </div>
                        </div>
                    </div>
                </section>

                <section class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm">
                    <div class="flex justify-between items-center mb-5">
                        <h3 class="text-[15px] font-bold text-slate-900 flex items-center">
                            <i data-lucide="activity" class="w-5 h-5 mr-2 text-[#3454D1]"></i>
                            Vitals
                        </h3>
                        <span class="text-[10px] font-medium text-slate-400">Recorded just now</span>
                    </div>
                    <div class="space-y-4">
                        <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                            <label class="text-[13px] font-bold text-slate-800">Blood Pressure</label>
                            <div class="flex items-center gap-2">
                                <input type="text" id="vital-bp" placeholder="120/80" class="w-24 text-right bg-transparent text-[13px] font-bold text-slate-900 outline-none placeholder:text-slate-300 placeholder:font-normal">
                                <span class="text-[11px] text-slate-400 font-medium">mmHg</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between border-b border-slate-100 pb-4">
                            <label class="text-[13px] font-bold text-slate-800">Temperature</label>
                            <div class="flex items-center gap-2">
                                <input type="number" step="0.1" id="vital-temp" placeholder="36.5" class="w-16 text-right bg-transparent text-[13px] font-bold text-slate-900 outline-none placeholder:text-slate-300 placeholder:font-normal">
                                <span class="text-[11px] text-slate-400 font-medium">°C</span>
                            </div>
                        </div>
                        <div class="flex items-center justify-between pb-2">
                            <label class="text-[13px] font-bold text-slate-800">Heart Rate</label>
                            <div class="flex items-center gap-2">
                                <input type="number" id="vital-hr" placeholder="72" class="w-16 text-right bg-transparent text-[13px] font-bold text-slate-900 outline-none placeholder:text-slate-300 placeholder:font-normal">
                                <span class="text-[11px] text-slate-400 font-medium">bpm</span>
                            </div>
                        </div>
                        <div class="pt-2">
                            <label class="block text-[12px] font-bold text-slate-800 mb-1.5">Clinical Notes / Symptoms</label>
                            <textarea id="symptoms" rows="2" class="w-full bg-white border border-slate-200 rounded-lg py-3 px-4 text-[13px] text-slate-900 focus:ring-1 focus:ring-[#3454D1] focus:border-[#3454D1] outline-none placeholder:text-slate-300"></textarea>
                        </div>
                    </div>
                </section>
            </form>
        </main>

        <div class="absolute bottom-0 w-full bg-white border-t border-slate-100 p-4 rounded-t-[1.5rem] shadow-[0_-4px_20px_rgba(0,0,0,0.03)] z-30">
            <div class="flex gap-3">
                <a href="dashboard.html" class="w-[35%] py-3.5 flex justify-center rounded-xl border border-dashed border-slate-300">
                    <span class="text-slate-600 font-bold text-[13px]">Cancel</span>
                </a>
                <div class="w-[65%] p-[2px] border border-dashed border-[#3454D1]/40 rounded-xl">
                    <button type="submit" form="intake-form" class="w-full bg-[#3454D1] text-white font-bold text-[13px] py-3.5 rounded-[10px] shadow-sm flex justify-center items-center gap-2">
                        <i data-lucide="save" class="w-4 h-4"></i>
                        Save & Queue for Sync
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/index.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
