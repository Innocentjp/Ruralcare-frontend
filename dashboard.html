<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | RuralCare Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #1f2937; }
        .mobile-container { max-width: 400px; margin: 0 auto; background: #ffffff; min-height: 100vh; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); padding-bottom: 80px; }
        .dashed-divider { border-bottom: 1px dashed #cbd5e1; }
    </style>
</head>
<body class="antialiased">
    <div class="mobile-container">
        <header class="bg-white px-5 py-5 flex justify-between items-center sticky top-0 z-20 border-b border-slate-100">
            <h1 class="text-[19px] font-bold text-[#3454D1] tracking-tight">RuralCare Pro</h1>
            <div class="flex items-center space-x-4 text-slate-600">
                <button id="sync-btn" class="relative">
                    <i data-lucide="refresh-cw" class="w-5 h-5"></i>
                    <span id="queued-indicator" class="absolute -top-1 -right-1 w-2 h-2 bg-red-500 rounded-full hidden"></span>
                </button>
                <button><i data-lucide="moon" class="w-5 h-5"></i></button>
                <button><i data-lucide="user-circle" class="w-6 h-6 text-slate-800"></i></button>
            </div>
        </header>

        <main class="px-5 pt-6 space-y-6">
            
            <div class="bg-white border border-slate-100 shadow-sm rounded-xl p-5 relative overflow-hidden">
                <div class="absolute top-0 left-0 w-1 h-full bg-rose-400"></div>
                <div class="flex justify-between items-start">
                    <div>
                        <div class="w-8 h-8 bg-rose-50 rounded flex items-center justify-center mb-3">
                            <i data-lucide="sparkles" class="w-4 h-4 text-rose-500"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-900" id="queued-count">0</h2>
                        <p class="text-[13px] font-medium text-slate-500 mt-1">Pending AI Flags</p>
                    </div>
                    <div class="bg-rose-50 text-rose-600 text-[10px] font-bold px-2.5 py-1 rounded-full flex items-center tracking-wide">
                        <span class="w-1.5 h-1.5 rounded-full bg-rose-500 mr-1.5"></span> ACTION REQ
                    </div>
                </div>
            </div>

            <section class="bg-white rounded-xl border border-slate-100 shadow-sm">
                <div class="px-5 py-4 flex justify-between items-center border-b border-slate-50">
                    <h3 class="text-[16px] font-bold text-slate-900 tracking-tight">Patient Queue & AI Alerts</h3>
                    <a href="#" class="text-[12px] font-bold text-[#3454D1]">View All</a>
                </div>
                
                <div class="w-full">
                    <div class="grid grid-cols-4 gap-2 px-5 py-3 bg-slate-50 border-b border-slate-100 text-[11px] font-semibold text-slate-500">
                        <div class="col-span-1">Patient ID</div>
                        <div class="col-span-1">Name</div>
                        <div class="col-span-1">Vitals (BP | Temp | HR)</div>
                        <div class="col-span-1 text-right">AI Status</div>
                    </div>
                    
                    <div id="patient-list" class="flex flex-col">
                    </div>
                </div>
            </section>
        </main>

        <nav class="absolute bottom-0 w-full bg-white border-t border-slate-100 z-20">
            <div class="flex justify-between items-center px-8 py-3">
                <a href="#" class="flex flex-col items-center text-[#3454D1]">
                    <i data-lucide="home" class="w-5 h-5 mb-1.5 stroke-[2.5]"></i>
                    <span class="text-[11px] font-bold">Home</span>
                </a>
                <a href="intake.html" class="flex flex-col items-center text-slate-400 hover:text-slate-600">
                    <i data-lucide="user" class="w-5 h-5 mb-1.5 stroke-[2.5]"></i>
                    <span class="text-[11px] font-semibold">Patients</span>
                </a>
                <a href="#" class="flex flex-col items-center text-slate-400 hover:text-slate-600 relative">
                    <i data-lucide="refresh-cw" class="w-5 h-5 mb-1.5 stroke-[2.5]"></i>
                    <span class="text-[11px] font-semibold">Sync</span>
                    <span id="nav-sync-badge" class="absolute -top-0.5 right-2 w-2 h-2 bg-red-500 rounded-full hidden"></span>
                </a>
                <a href="#" class="flex flex-col items-center text-slate-400 hover:text-slate-600">
                    <i data-lucide="user-circle" class="w-5 h-5 mb-1.5 stroke-[2.5]"></i>
                    <span class="text-[11px] font-semibold">Profile</span>
                </a>
            </div>
        </nav>
    </div>

    <script src="js/index.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
